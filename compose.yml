services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: mhcsim-api:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-8280}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
